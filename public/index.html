<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1c1b1f">
    <title>Doma Ai | المنصة الذكية</title>

    <!-- Icons & Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- Video JS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" href="css/tokens.css?v=2.9.2">
    <link rel="stylesheet" href="css/main.css?v=2.9.2">
    <link rel="stylesheet" href="css/components.css?v=2.9.2">
</head>

<body class="premium-bg">

    <div id="v3-app">
        <!-- Persistent Navigation -->
        <nav id="v3-nav">
            <div class="container"
                style="display: flex; justify-content: space-between; align-items: center; height: 100%; width: 100%;">
                <div class="logo display-font" style="font-size: 24px; font-weight: 700; cursor: pointer;" onclick="App.handleLogoClick()">
                    DOMA<span style="color: var(--primary);"> AI</span>
                </div>
                <div id="nav-actions" style="display: flex; gap: 12px; align-items: center;">
                    <!-- Actions will be injected here -->
                </div>
            </div>
        </nav>

        <main id="v3-content">
            <!-- Content will be injected here by App.render() -->
        </main>
    </div>

    <!-- Modals Container -->
    <div id="v3-modals-container"></div>

    <!-- Vercel Speed Insights (Optional) -->
    <script defer src="/_vercel/insights/script.js"></script>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- App Scripts -->
    <script src="js/db.js?v=2.9.2"></script>
    <script src="js/store.js?v=2.9.2"></script>
    <script src="js/ui.js?v=2.9.2"></script>
    <script src="js/app.js?v=2.9.2"></script>
</body>

</html>
