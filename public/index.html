<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1c1b1f">
    <title>Doma Ai | المنصة الذكية</title>

    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://vjs.zencdn.net">

    <!-- Icons & Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- Video JS CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" href="css/tokens.css?v=3.0.1">
    <link rel="stylesheet" href="css/main.css?v=3.0.1">
    <link rel="stylesheet" href="css/components.css?v=3.0.1">
</head>

<body class="premium-bg">

    <!-- Premium Glow Preloader -->
    <div id="v3-preloader">
        <div class="preloader-spinner">
            <div class="logo display-font" style="font-size: 32px; font-weight: 800; cursor: pointer; letter-spacing: 1px; color: #FFF;">
                DOMA<span style="color: var(--primary);"> AI</span>
            </div>
            <div class="preloader-glow"></div>
            <div class="preloader-bar">
                <div class="preloader-progress"></div>
            </div>
        </div>
    </div>

    <div id="v3-app" style="opacity: 0; transition: opacity 0.4s ease;">
        <!-- Persistent Navigation -->
        <nav id="v3-nav">
            <div class="container"
                style="display: flex; justify-content: space-between; align-items: center; height: 100%; width: 100%;">
                <div class="logo display-font" style="font-size: 24px; font-weight: 700; cursor: pointer;" onclick="App.handleLogoClick()">
                    DOMA<span style="color: var(--primary);"> AI</span>
                </div>
                <div id="nav-actions" style="display: flex; gap: 12px; align-items: center;">
                </div>
            </div>
        </nav>

        <main id="v3-content">
        </main>
    </div>

    <!-- Modals Container -->
    <div id="v3-modals-container"></div>

    <!-- External SDKs (Deferred for speed) -->
    <script defer src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>

    <!-- App Scripts (Deferred for speed) -->
    <script defer src="js/db.js?v=3.0.1"></script>
    <script defer src="js/store.js?v=3.0.1"></script>
    <script defer src="js/ui.js?v=3.0.1"></script>
    <script defer src="js/app.js?v=3.0.1"></script>
</body>

</html>
